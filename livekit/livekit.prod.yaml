port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  port_range_start: 50100
  port_range_end: 50200
  use_external_ip: true   # LiveKit henter offentlig IP automatisk

keys:
  # Må matche LIVEKIT_API_KEY og LIVEKIT_API_SECRET i .env
  devkey: devsecret1234567890abcdef12345678

redis:
  address: redis:6379

room:
  auto_create: true
  empty_timeout: 300
  departure_timeout: 20

logging:
  level: info
  sample: true
