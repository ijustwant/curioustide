events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream backend  { server backend:4000; }
  upstream frontend { server frontend:3000; }

  # HTTP — redirect til HTTPS, men la gjennom ACME-utfordring for Let's Encrypt
  server {
    listen 80;
    server_name curioustide.no www.curioustide.no;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://curioustide.no$request_uri;
    }
  }

  # HTTPS — curioustide.no
  server {
    listen 443 ssl;
    server_name curioustide.no www.curioustide.no;

    ssl_certificate     /etc/letsencrypt/live/curioustide.no-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/curioustide.no-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    location /download/ {
      root /var/www;
      index index.html;
      add_header Content-Disposition 'attachment' always;
      location ~* \.html$ {
        root /var/www;
        add_header Content-Disposition '' always;
        add_header Content-Type 'text/html; charset=utf-8' always;
      }
    }
    location = /download {
      return 301 /download/;
    }

    location /api/payments/webhook {
      proxy_pass http://backend/payments/webhook;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_request_buffering off;
    }

    location /api/ {
      proxy_pass http://backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /livekit/ {
      proxy_pass http://livekit:7880/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }

  # TODO: curioustide.com HTTPS-blokk legges til når domenet og SSL-sertifikat er klart.
  # Kjør scripts/init-letsencrypt.sh for å sette opp sertifikat, deretter legg til blokken nedenfor:
  #
  # server {
  #   listen 443 ssl;
  #   server_name curioustide.com www.curioustide.com;
  #   ssl_certificate     /etc/letsencrypt/live/curioustide.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/curioustide.com/privkey.pem;
  #   ... (samme lokasjonblokker som curioustide.no)
  # }
}
